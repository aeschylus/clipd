<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>clipd</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="search-bar">
      <span class="search-icon" aria-hidden="true">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      <input
        id="search-input"
        type="text"
        placeholder="Search clipboard history…"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      />
      <kbd class="esc-hint" id="esc-hint">esc</kbd>
    </div>

    <div id="clip-list" role="listbox" aria-label="Clipboard history">
      <div id="empty-state" class="hidden">
        <span class="empty-icon" aria-hidden="true">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
          </svg>
        </span>
        <p id="empty-message">No clips yet.</p>
        <p class="empty-sub">Copy something to get started.</p>
      </div>
    </div>

    <div id="status-bar">
      <span id="clip-count">0 clips</span>
      <span id="shortcut-hint">
        <kbd>↑↓</kbd> navigate &nbsp;
        <kbd>↵</kbd> paste &nbsp;
        <kbd>⌘⌫</kbd> delete
      </span>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
